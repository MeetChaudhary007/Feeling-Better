<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Medicine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /*--------------------------------------------------------------
        # Update Medicine Page Styles
        --------------------------------------------------------------*/

        /* Main Container */
        .update-medicine-container {
            margin-top: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 5px;
            box-shadow: 0px 0 30px rgba(1, 41, 112, 0.1);
        }

        /* Page Title */
        .update-medicine-title {
            font-size: 24px;
            font-weight: 600;
            color: #012970;
            margin-bottom: 20px;
        }

        /* Form Elements */
        .form-label {
            font-weight: 600;
            color: #444444;
        }

        .form-control {
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #4154f1;
            box-shadow: 0 0 0 0.2rem rgba(65, 84, 241, 0.25);
        }

        /* Button Styles */
        .btn-submit {
            background-color: #4154f1;
            color: #ffffff;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #6776f4;
        }

        /* Alert Messages */
        .alert {
            margin-top: 20px;
            border-radius: 4px;
        }

        .alert-success {
            background-color: #d1e7dd;
            color: #0f5132;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
        }

        /* Update Medicine Form */
        .update-medicine-form {
            display: flex;
            flex-direction: column;
        }

        .update-medicine-form input,
        .update-medicine-form select {
            margin-bottom: 15px;
        }

        /* Notes Section */
        .notes {
            margin-top: 20px;
        }

        .notes-title {
            font-weight: 600;
            color: #012970;
            margin-bottom: 10px;
        }

        .notes-text {
            font-size: 14px;
            color: #444444;
        }

        /* Back Button */
        .btn-back {
            background-color: #e2e3e5;
            color: #444444;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            margin-top: 20px;
        }

        .btn-back:hover {
            background-color: #d3d3d4;
        }
    </style>
</head>

<body>

    <div class="container update-medicine-container">
        <h1 class="update-medicine-title">Update Medicine</h1>

        <form class="update-medicine-form" id="update-medicine-form">
            <input type="hidden" id="medicine-id"> <!-- Hidden input for medicine ID -->

            <label for="medicine-name" class="form-label">Medicine Name</label>
            <input type="text" id="medicine-name" class="form-control" required>

            <label for="dosage" class="form-label">Dosage</label>
            <input type="text" id="dosage" class="form-control" required>

            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" id="quantity" class="form-control" required>

            <label for="expiration-date" class="form-label">Expiration Date</label>
            <input type="date" id="expiration-date" class="form-control" required>

            <button type="submit" class="btn btn-submit">Update Medicine</button>
        </form>

        <button class="btn btn-back" onclick="window.history.back();">Back</button>

        <div class="notes">
            <h5 class="notes-title">Notes:</h5>
            <p class="notes-text">Please ensure all information is correct before submitting.</p>
        </div>

        <!-- Alert messages -->
        <div class="alert alert-success" role="alert" style="display:none;">
            Medicine updated successfully!
        </div>
        <div class="alert alert-error" role="alert" style="display:none;">
            An error occurred while updating medicine.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // JavaScript to handle form submission and alerts
        const form = document.getElementById('update-medicine-form');
        const successAlert = document.querySelector('.alert-success');
        const errorAlert = document.querySelector('.alert-error');

        // Example data for populating the form (to be replaced with AJAX call)
        const medicineData = {
            id: 1,
            name: "Aspirin",
            dosage: "500mg",
            quantity: 100,
            expirationDate: "2024-12-31"
        };

        // Populate form with example data (simulate loading existing medicine data)
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('medicine-id').value = medicineData.id;
            document.getElementById('medicine-name').value = medicineData.name;
            document.getElementById('dosage').value = medicineData.dosage;
            document.getElementById('quantity').value = medicineData.quantity;
            document.getElementById('expiration-date').value = medicineData.expirationDate;
        });

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the default form submission

            // Simulating a successful submission
            successAlert.style.display = 'block';
            errorAlert.style.display = 'none';

            // Reset the form after a short delay
            setTimeout(() => {
                form.reset();
                successAlert.style.display = 'none';
            }, 2000);
        });
    </script>
</body>

</html>
